services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: capture
      POSTGRES_PASSWORD: capture
      POSTGRES_DB: capture
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capture -d capture"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://capture:capture@postgres:5432/capture?sslmode=disable
      MEDIA_ROOT: /data/media
      DOWNLOAD_WORKERS: "4"
      CORS_ORIGINS: "*"
    volumes:
      - ${MEDIA_PATH:-./media}:/data/media
      - /vol2/@apphome/trim.openclaw/data/workspace:/tg-index:ro
      - /vol1/1000/tg:/tg-media:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_INTERNAL_URL: "http://backend:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

